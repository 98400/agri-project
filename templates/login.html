<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Precision Farming</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
     body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            /* Beautiful Green Gradient Background */
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); 
        }
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px 30px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        h2 { margin-bottom: 20px; color: #2c3e50; font-weight: 600; }
        input { 
            width: 100%; 
            padding: 14px 15px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            outline: none; 
            font-size: 15px; 
            transition: 0.3s;
        }
        input:focus { 
            border-color: #56ab2f; 
            box-shadow: 0 0 8px rgba(86, 171, 47, 0.4); 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #56ab2f; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: all 0.3s ease;
        }
        button:hover { 
            background: #448a25; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(68, 138, 37, 0.4);
        }
        p { margin-top: 20px; font-size: 14px; color: #555; }
        a { color: #56ab2f; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
        .error { color: #e74c3c; font-size: 14px; margin-bottom: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome Back</h2>
        
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
</body>

</html>
