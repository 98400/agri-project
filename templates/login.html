<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Precision Farming</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
       /* Login Page Attractive Theme */
body {
    background-image: url('https://image.pollinations.ai/prompt/Agri-Bot%20AI%20robot%20working%20in%20a%20modern%20farm%20with%20data%20overlays%20natural%20lighting%20photorealistic'); /* पहिली इमेज वापरा */
    background-size: cover;
    background-position: center;
    font-family: 'Poppins', sans-serif; /* आधुनिक फॉन्ट */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-container {
    background: rgba(255, 255, 255, 0.9); /* पारदर्शक पांढरा बॅकग्राउंड */
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); /* भारी शॅडो */
    width: 350px;
    text-align: center;
}

.login-container h2 {
    color: #2e7d32; /* शेतीशी संबंधित हिरवा रंग */
    margin-bottom: 30px;
    font-weight: 600;
}

.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group label {
    display: block;
    color: #555;
    margin-bottom: 5px;
}

.form-control {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
}

.btn-login {
    background-color: #2e7d32; /* हिरवे बटण */
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
    transition: background-color 0.3s;
}

.btn-login:hover {
    background-color: #1b5e20; /* डार्क हिरवा होव्हर इफेक्ट */
}

.signup-link {
    margin-top: 20px;
    display: block;
    color: #555;
    text-decoration: none;
}
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome Back</h2>
        
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
</body>

</html>
